name: Bug report
description: Report a bug or unexpected behaviour in the InfoCard control
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Bind InfoCard to ...
        2. Open form on ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Control version
      description: From the manifest, or the version badge if `Show Version Info` is on.
      placeholder: "4.1.0"
    validations:
      required: true

  - type: dropdown
    id: host
    attributes:
      label: Host
      options:
        - Model-driven app (web)
        - Field Service Mobile (iOS)
        - Field Service Mobile (Android)
        - Power Apps Mobile
        - Test harness (npm start)
        - Other
    validations:
      required: true

  - type: input
    id: entity
    attributes:
      label: Form / entity
      placeholder: "msdyn_workorder, bookableresourcebooking, ..."

  - type: textarea
    id: logs
    attributes:
      label: Console logs / screenshots
      description: Paste any `[InfoCard]` console output (set `window.__INFOCARD_DEBUG__ = true` for verbose tracing).
      render: shell
